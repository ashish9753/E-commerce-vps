name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_API:      ghcr.io/${{ github.repository_owner }}/ecommerce-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ecommerce-frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build Docker images and push to GitHub Container Registry (GHCR)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub

      - name: Set up Docker Buildx (enables layer cache)
        uses: docker/setup-buildx-action@v3

      # ── Backend API ──────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: "./E Commerce Backend"
          file:    "./E Commerce Backend/Dockerfile"
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── React Frontend ───────────────────────────────────────────────────
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./E-Commerce-Frontend
          file:    ./E-Commerce-Frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — SSH into VPS, pull code + images, restart via docker compose
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push      # only runs after images are pushed successfully
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR:   ${{ github.actor }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          envs:     GHCR_TOKEN,GH_ACTOR
          script: |
            set -e

            # ── 1. Pull latest code from GitHub ───────────────────
            cd ~/E-commerce-vps
            git pull origin main

            # ── 2. Authenticate with GHCR on the server ──────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # ── 3. Pull the freshly built images ──────────────────
            export GHCR_OWNER="$GH_ACTOR"
            docker compose -f docker-compose.prod.yml pull

            # ── 4. Restart services (rolling, keeps Redis data) ───
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── 5. Remove ALL unused images (old versions, dangling layers) ─
            docker image prune -a -f

            # ── 6. Print running containers for the job log ───────
            docker compose -f docker-compose.prod.yml ps

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Delete old image versions from GHCR, keep only the latest 2
# ─────────────────────────────────────────────────────────────────────────────
  cleanup-ghcr:
    name: Clean up old GHCR images
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    permissions:
      packages: write

    steps:
      - name: Delete old API image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ecommerce-api
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false

      - name: Delete old Frontend image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ecommerce-frontend
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false
