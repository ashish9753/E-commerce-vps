server {
  listen 3000;
  server_name localhost;

  # Allow large file uploads (product images etc.)
  client_max_body_size 20m;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json;
  gzip_proxied any;

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Rich link previews for shared product links. Social crawlers (WhatsApp,
  # Facebook, X/Twitter, etc.) can't run our SPA's JS, so for those user-agents
  # we serve server-rendered Open Graph tags (product image + title + price)
  # from the backend. Real visitors fall through to the normal SPA.
  location ~ ^/product/ {
    if ($http_user_agent ~* "facebookexternalhit|Facebot|Twitterbot|WhatsApp|Slackbot|TelegramBot|LinkedInBot|Discordbot|Pinterest|redditbot|Googlebot|bingbot|Applebot|vkShare|Embedly|Quora|SkypeUriPreview|W3C_Validator|Google-AMPHTML") {
      rewrite ^/product/([^/?#]+).*$ /api/v1/og/product/$1 break;
      proxy_pass http://api:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    try_files $uri /index.html;
  }

  # SPA routing: fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Proxy all /api/* requests to the backend container
  location /api/ {
    proxy_pass http://api:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward cookies for httpOnly refresh-token auth
    proxy_pass_header Set-Cookie;
  }
}
