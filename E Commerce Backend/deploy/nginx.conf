# /etc/nginx/sites-available/default  (symlinked into sites-enabled)
#
# TLS is terminated here with a Let's Encrypt cert for the nip.io hostname so
# the HTTPS Render frontend can call this API without mixed-content / cert
# errors. nginx reverse-proxies to the Node container on 127.0.0.1:5000.
#
# After placing this file run:
#   sudo certbot --nginx -d 82-29-164-26.nip.io   (issues/installs the cert)
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name 82-29-164-26.nip.io;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name 82-29-164-26.nip.io;

    # Allow image uploads (products/banners up to ~5 × 2 MB). Default is 1 MB,
    # which silently 413s uploads and shows as "Network Error" in the browser.
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/82-29-164-26.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/82-29-164-26.nip.io/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade — required for Socket.io live chat / notifications.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
